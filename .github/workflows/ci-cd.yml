name: CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, typecheck, coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test:coverage

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - run: npm run test:e2e
        env:
          CI: "true"
          NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
          NEXT_PUBLIC_SUPABASE_ANON_KEY: test-anon-key
          CRON_SECRET: test-cron-secret-32chars-min

  # Optional: run only after manual approval on workflow_dispatch
  supabase-migrate:
    name: Supabase db push (manual)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    environment: production-database
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link and push migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROD_PROJECT_REF }}
        run: |
          supabase link --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"
          supabase db push

  deploy-notes:
    name: Production deploy notes
    runs-on: ubuntu-latest
    needs: [quality, e2e]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Summary
        run: |
          echo "## Production deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "Vercel deploys automatically from main via Git integration." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Before traffic" >> "$GITHUB_STEP_SUMMARY"
          echo "1. Run \`supabase db push\` on production (or approve supabase-migrate workflow)." >> "$GITHUB_STEP_SUMMARY"
          echo "2. Confirm Vercel Production env vars (see docs/deployment/production-plan.md)." >> "$GITHUB_STEP_SUMMARY"
          echo "3. Verify Paystack webhook URL and live keys." >> "$GITHUB_STEP_SUMMARY"
          echo "4. Check /api/health and /api/ready on production domain." >> "$GITHUB_STEP_SUMMARY"
